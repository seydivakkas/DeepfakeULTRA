# Run #3 Ana Yapılandırma — DeepFake Detection System
# Veri Seti Artırımı & Eğitim İyileştirme

# Eğitim Genel
training:
  epochs: 20
  batch_size: 16                   # 8GB VRAM için optimize
  accumulation_steps: 4            # Efektif batch = 64
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 2                 # Lineer warmup
  unfreeze_epoch: 4                # Backbone bu epoch'ta açılır
  backbone_lr_factor: 0.1          # Backbone için LR çarpanı
  gradient_clip_max_norm: 1.0
  from_scratch: true               # Checkpoint yok, sıfırdan başlat

  # Erken Durdurma
  early_stopping:
    enabled: true
    monitor: val_auc               # val_macro_f1 veya val_auc
    patience: 3
    min_delta: 0.001

  # LR Scheduler
  scheduler:
    type: cosine_with_warmup        # cosine_with_warmup veya reduce_on_plateau
    plateau_factor: 0.5
    plateau_patience: 2
    cosine_eta_min: 1.0e-6

# Veri
data:
  # Offline augmentasyon
  offline_augmentation:
    enabled: true
    version_tag: "v3"
    output_dir: "dataset/augmented_v3"
    multipliers:
      SPOOF: 5
      REAL_CASIA: 8
      REAL_FF: 2
      FAKE: 1

  # Online augmentasyon (eğitim sırasında)
  online_augmentation:
    enabled: true
    blur_sharpness_p: 0.30
    jpeg_compression_p: 0.15
    color_jitter_p: 0.40
    noise_injection_p: 0.20

  # Test setine augmentasyon KESİNLİKLE uygulanmayacak
  test_augmentation: false

# CutMix / MixUp
mixup:
  enabled: true
  cutmix_ratio: 0.6               # %60 CutMix, %40 MixUp
  alpha: 1.0                      # Beta dağılımı parametresi
  activate_after_warmup: true      # Warmup bittikten sonra aktif

# Loss
loss:
  type: focal_loss
  gamma: 2.0
  label_smoothing: 0.1
  class_weights:
    REAL: 1.5
    FAKE: 1.0
    SPOOF: 3.0                    # Azınlık sınıfına ağırlık

  # Knowledge Distillation
  kd_alpha: 0.5
  kd_temperature: 3.0

# VRAM Optimizasyonu (RTX 4070 8GB)
optimization:
  mixed_precision: true            # FP16 AMP
  gradient_checkpointing: true     # Backbone için
  pin_memory: true
  num_workers: 6
  dynamic_batch_scaling: true      # OOM anında batch yarıya

# Model Mimarisi
model:
  rgb_backbone: "mobilenet_v3_large"
  freq_backbone: "mobilenet_v3_large"
  teacher_backbone: "efficientnet_b5"
  num_classes: 3                   # REAL(0), FAKE(1), SPOOF(2)
  dual_branch: true                # Digital + Physical branch
  img_size: 224
  fusion_dim: 960
  lstm_hidden: 128
  lstm_layers: 3
  lstm_bidirectional: true
  attention_heads: 4
  classifier_dropout: 0.5

# Loglama
logging:
  log_class_distribution: true     # Her epoch başında
  log_per_class_metrics: true      # Her epoch sonunda
  save_confusion_matrix: true      # Validasyon sonunda
  checkpoint_monitor: val_auc
  mlflow_experiment: "deepfake-v3-run3"
  log_dir: "logs/run3"

# Checkpoint
checkpoint:
  save_dir: "models"
  best_model_name: "best_run3.pth"
  save_every_n_epochs: 5
